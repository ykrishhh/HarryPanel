<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#00ffff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#00ffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00ffff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#00ffff" stroke-width="1"/>
  </g>
  
  <!-- Terminal window -->
  <rect x="100" y="100" width="400" height="250" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="2"/>
  <rect x="100" y="100" width="400" height="30" rx="8" fill="#2d2d2d"/>
  <circle cx="120" cy="115" r="6" fill="#ff5f56"/>
  <circle cx="140" cy="115" r="6" fill="#ffbd2e"/>
  <circle cx="160" cy="115" r="6" fill="#27c93f"/>
  <text x="200" y="119" fill="#666" font-family="monospace" font-size="12">Terminal</text>
  
  <!-- Terminal content -->
  <text x="120" y="160" fill="#00ff88" font-family="monospace" font-size="14">$ harrypanel status</text>
  <text x="120" y="180" fill="#00ffff" font-family="monospace" font-size="14">✓ Dashboard: running</text>
  <text x="120" y="200" fill="#00ffff" font-family="monospace" font-size="14">✓ API: active</text>
  <text x="120" y="220" fill="#00ffff" font-family="monospace" font-size="14">✓ Database: connected</text>
  <text x="120" y="240" fill="#00ffff" font-family="monospace" font-size="14">✓ Terminal: ready</text>
  <text x="120" y="270" fill="#666" font-family="monospace" font-size="14">Deployed on Railway ✓</text>
  
  <!-- Dashboard card -->
  <rect x="550" y="100" width="550" height="250" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="2"/>
  <text x="580" y="140" fill="#fff" font-family="sans-serif" font-size="24" font-weight="bold">Dashboard</text>
  <text x="580" y="170" fill="#666" font-family="sans-serif" font-size="16">Real-time monitoring</text>
  
  <!-- CPU bar -->
  <text x="580" y="210" fill="#999" font-family="monospace" font-size="12">CPU</text>
  <rect x="620" y="200" width="300" height="12" rx="6" fill="#333"/>
  <rect x="620" y="200" width="180" height="12" rx="6" fill="url(#accent)"/>
  <text x="930" y="210" fill="#00ffff" font-family="monospace" font-size="12">60%</text>
  
  <!-- Memory bar -->
  <text x="580" y="240" fill="#999" font-family="monospace" font-size="12">RAM</text>
  <rect x="620" y="230" width="300" height="12" rx="6" fill="#333"/>
  <rect x="620" y="230" width="210" height="12" rx="6" fill="#00ff88"/>
  <text x="930" y="240" fill="#00ff88" font-family="monospace" font-size="12">70%</text>
  
  <!-- Disk bar -->
  <text x="580" y="270" fill="#999" font-family="monospace" font-size="12">Disk</text>
  <rect x="620" y="260" width="300" height="12" rx="6" fill="#333"/>
  <rect x="620" y="260" width="135" height="12" rx="6" fill="#ffbd2e"/>
  <text x="930" y="270" fill="#ffbd2e" font-family="monospace" font-size="12">45%</text>
  
  <!-- Features list -->
  <text x="580" y="310" fill="#666" font-family="monospace" font-size="12">Process Manager • File Manager • Database Admin • Terminal</text>
  
  <!-- Title -->
  <text x="100" y="430" fill="#fff" font-family="sans-serif" font-size="48" font-weight="bold">HarryPanel</text>
  <text x="100" y="470" fill="#00ffff" font-family="sans-serif" font-size="24">Web Hosting Control Panel</text>
  
  <!-- Subtitle -->
  <text x="100" y="510" fill="#666" font-family="sans-serif" font-size="18">Deploy anywhere. No root required. 60 seconds to start.</text>
  
  <!-- Badges -->
  <rect x="100" y="540" width="80" height="24" rx="4" fill="#1e1e1e" stroke="#00ffff" stroke-width="1"/>
  <text x="140" y="556" fill="#00ffff" font-family="monospace" font-size="12" text-anchor="middle">MIT</text>
  
  <rect x="190" y="540" width="80" height="24" rx="4" fill="#1e1e1e" stroke="#00ff88" stroke-width="1"/>
  <text x="230" y="556" fill="#00ff88" font-family="monospace" font-size="12" text-anchor="middle">Python</text>
  
  <rect x="280" y="540" width="80" height="24" rx="4" fill="#1e1e1e" stroke="#ffbd2e" stroke-width="1"/>
  <text x="320" y="556" fill="#ffbd2e" font-family="monospace" font-size="12" text-anchor="middle">Flask</text>
  
  <!-- GitHub URL -->
  <text x="1100" y="590" fill="#666" font-family="monospace" font-size="14" text-anchor="end">github.com/ykrishhh/HarryPanel</text>
</svg>
